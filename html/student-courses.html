<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Cursos — Lumina LMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <script src="../js/auth0-config.js"></script>
  <script src="../js/auth-guard.js"></script>
  <style>
    :root {
      --bg:#09090b; --surface:#111113; --card:#18181b; --card-hover:#1c1c20;
      --border:rgba(255,255,255,.07); --border-subtle:rgba(255,255,255,.04);
      --accent:#6366f1; --accent-2:#818cf8;
      --emerald:#10b981; --amber:#f59e0b; --rose:#f43f5e; --sky:#0ea5e9;
      --text:#fafafa; --text-2:#a1a1aa; --text-3:#71717a;
      --sidebar-w:240px; --top-h:56px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;}

    .sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px 20px 16px;border-bottom:1px solid var(--border);}
    .logo-mark{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
    .logo-text{font-size:15px;font-weight:700;letter-spacing:-.3px;}
    .logo-sub{font-size:11px;color:var(--text-3);}
    .sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;}
    .nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-3);padding:12px 20px 6px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:var(--text-2);text-decoration:none;font-size:13.5px;font-weight:500;position:relative;transition:color .15s,background .15s;}
    .nav-item:hover{color:var(--text);background:rgba(255,255,255,.04);}
    .nav-item.active{color:var(--text);background:rgba(99,102,241,.12);}
    .nav-item.active .nv-icon{color:var(--accent);}
    .nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 2px 2px 0;}
    .nv-icon{width:16px;text-align:center;font-size:13px;color:var(--text-3);}
    .sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
    .user-chip{display:flex;align-items:center;gap:10px;}
    .u-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
    .u-name{font-size:13px;font-weight:600;color:var(--text);}
    .u-role{font-size:11px;color:var(--text-3);}

    .topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--top-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:90;}
    .tb-title{font-size:15px;font-weight:600;}
    .tb-right{display:flex;align-items:center;gap:8px;}
    .tb-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;text-decoration:none;transition:all .15s;}
    .tb-btn:hover{color:var(--text);border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.04);}
    .tb-btn-danger{border-color:rgba(244,63,94,.2);color:var(--rose);}
    .tb-btn-danger:hover{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.35);}

    .main{margin-left:var(--sidebar-w);margin-top:var(--top-h);flex:1;padding:28px;}
    .page-header{margin-bottom:24px;}
    .page-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px;}
    .page-sub{font-size:13px;color:var(--text-3);}

    /* Override Bootstrap card styles injected by student-courses.js */
    #coursesContainer .card {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 14px !important;
      color: var(--text) !important;
    }
    #coursesContainer .card-header {
      border-bottom: 1px solid var(--border) !important;
      border-radius: 14px 14px 0 0 !important;
      padding: 14px 18px !important;
    }
    #coursesContainer .card-header.bg-info    { background: rgba(14,165,233,.15)  !important; color: var(--sky)     !important; border-left: 3px solid var(--sky) !important; }
    #coursesContainer .card-header.bg-success  { background: rgba(16,185,129,.15)  !important; color: var(--emerald) !important; border-left: 3px solid var(--emerald) !important; }
    #coursesContainer .card-header.bg-warning  { background: rgba(245,158,11,.15)  !important; color: var(--amber)   !important; border-left: 3px solid var(--amber) !important; }
    #coursesContainer .card-header.bg-primary  { background: rgba(99,102,241,.15)  !important; color: var(--accent-2) !important; border-left: 3px solid var(--accent) !important; }
    #coursesContainer .card-header.bg-danger   { background: rgba(244,63,94,.15)   !important; color: var(--rose)    !important; border-left: 3px solid var(--rose) !important; }
    #coursesContainer .card-header h5 { color: inherit !important; font-size: 14px !important; font-weight: 700 !important; }
    #coursesContainer .card-body { padding: 18px !important; }
    #coursesContainer .card-body small { color: var(--text-3) !important; font-size: 11px !important; }
    #coursesContainer .card-body p { color: var(--text) !important; font-size: 13px !important; }
    #coursesContainer .card-body .text-muted { color: var(--text-2) !important; }
    #coursesContainer .progress { background: rgba(255,255,255,.06) !important; border-radius: 4px !important; height: 5px !important; }
    #coursesContainer .progress-bar.bg-info    { background: var(--sky)     !important; }
    #coursesContainer .progress-bar.bg-success  { background: var(--emerald) !important; }
    #coursesContainer .progress-bar.bg-warning  { background: var(--amber)   !important; }
    #coursesContainer .badge.bg-info    { background: rgba(14,165,233,.2) !important; color: var(--sky)     !important; font-size: 11px !important; }
    #coursesContainer .badge.bg-success  { background: rgba(16,185,129,.2) !important; color: var(--emerald) !important; font-size: 11px !important; }
    #coursesContainer .badge.bg-warning  { background: rgba(245,158,11,.2) !important; color: var(--amber)   !important; font-size: 11px !important; }
    #coursesContainer .card-footer { background: rgba(255,255,255,.02) !important; border-top: 1px solid var(--border) !important; padding: 12px 18px !important; }
    #coursesContainer .btn-primary { background: var(--accent) !important; border-color: var(--accent) !important; font-size: 12.5px !important; border-radius: 8px !important; }
    #coursesContainer .btn-outline-secondary { border-color: var(--border) !important; color: var(--text-2) !important; font-size: 12.5px !important; border-radius: 8px !important; background: transparent !important; }
    #coursesContainer .btn-outline-secondary:hover { background: rgba(255,255,255,.06) !important; color: var(--text) !important; }

    /* Course detail override */
    #courseDetailsContainer .card { background: var(--card) !important; border: 1px solid var(--border) !important; border-radius: 14px !important; }
    #courseDetailsContainer .card-header { background: var(--surface) !important; border-bottom: 1px solid var(--border) !important; color: var(--text) !important; }
    #courseDetailsContainer .card-body { color: var(--text-2) !important; }
    #courseDetailsContainer h6 { color: var(--text) !important; font-size: 13px !important; }
    #courseDetailsContainer .list-group-item { background: transparent !important; border-color: var(--border-subtle) !important; color: var(--text-2) !important; font-size: 13px !important; }
    #courseDetailsContainer .btn-close { filter: invert(1) !important; opacity: .5 !important; }

    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">L</div>
      <div><div class="logo-text">Lumina LMS</div><div class="logo-sub">Mis Cursos</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Navegación</div>
      <a class="nav-item" href="courses.html"><span class="nv-icon"><i class="fas fa-th-large"></i></span> Dashboard</a>
      <a class="nav-item" href="courses.html"><span class="nv-icon"><i class="fas fa-book-open"></i></span> Mis Cursos</a>
      <a class="nav-item" href="calendar.html"><span class="nv-icon"><i class="fas fa-calendar-alt"></i></span> Calendario</a>
      <a class="nav-item" href="schedule.html"><span class="nv-icon"><i class="fas fa-clock"></i></span> Horario</a>
      <a class="nav-item active" href="student-courses.html"><span class="nv-icon"><i class="fas fa-graduation-cap"></i></span> Cursos Activos</a>
      <div class="nav-label">Cuenta</div>
      <a class="nav-item" href="profile.html"><span class="nv-icon"><i class="fas fa-user"></i></span> Mi Perfil</a>
      <a class="nav-item" href="settings.html"><span class="nv-icon"><i class="fas fa-sliders-h"></i></span> Configuración</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="u-av">E</div>
        <div><div class="u-name">Estudiante</div><div class="u-role">Alumno</div></div>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <span class="tb-title">Cursos Activos</span>
    <div class="tb-right">
      <a href="cursos-venta.html" class="tb-btn"><i class="fas fa-store"></i> Tienda</a>
      <a href="profile.html" class="tb-btn"><i class="fas fa-user"></i> Perfil</a>
      <button class="tb-btn tb-btn-danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
    </div>
  </header>

  <main class="main">
    <div class="page-header">
      <div class="page-title">Mis Cursos Activos</div>
      <div class="page-sub">Accede a tus cursos, tareas y materiales de estudio</div>
    </div>

    <!-- Courses injected by student-courses.js -->
    <div class="row g-4 mb-4" id="coursesContainer"></div>

    <!-- Course detail panel (shown/hidden by JS) -->
    <div id="courseDetailsContainer" class="mt-4" style="display:none;">
      <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <h5 id="courseTitle" class="mb-0"></h5>
          <button type="button" class="btn-close" onclick="hideCourseDetails()"></button>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6">
              <h6><i class="fas fa-tasks me-2"></i>Tareas Pendientes</h6>
              <div id="assignmentsList" class="list-group list-group-flush mt-2"></div>
            </div>
            <div class="col-md-6">
              <h6><i class="fas fa-book-open me-2"></i>Materiales de Estudio</h6>
              <div id="materialsList" class="list-group list-group-flush mt-2"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/student-courses.js"></script>
  <script src="../js/main.js"></script>
  <script>
    async function handleLogout() {
      localStorage.removeItem('user');
      localStorage.removeItem('authToken');
      localStorage.removeItem('rememberMe');
      try { await fetch('/auth/logout', { method: 'POST', credentials: 'include' }); } catch(_) {}
      window.location.href = '/html/login.html';
    }
  </script>
</body>
</html>
